services:
  db:
    image: postgres:16-alpine
    container_name: ridersapp-db
    environment:
      POSTGRES_DB: ridersapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ridersapp"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: ridersapp-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ridersapp?schema=public
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: ridersapp-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
